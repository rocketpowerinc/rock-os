<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock-OS Link Health</title>
<link rel="icon" href="assets/favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="assets/favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">
<meta name="theme-color" content="#4f6475">
<script src="js/theme-init.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="grid-overlay"></div>

<nav class="navbar">

<div class="logo-group">
<img src="assets/Rock-OS-Hero-Steel.png" class="logo theme-logo" alt="Rock-OS">
<div class="brand">Rock-OS</div>
</div>

<div class="nav-links">
<a href="index.html">HOME</a>
<select id="themeSelect" class="theme-select" aria-label="Theme">
<option value="steel">Steel</option>
<option value="rugged">Rugged</option>
<option value="cyberpunk">Cyberpunk</option>
<option value="blue-grass">Blue-Grass</option>
</select>
</div>

</nav>

<main class="health-layout">
<section class="health-header">
<p class="command-kicker">Local integrity scan</p>
<h1>Link Health</h1>
<button id="refreshLinkHealthBtn" class="command-button primary" type="button">Refresh Scan</button>
</section>

<section class="health-summary" aria-label="Link health summary">
<div>
<span>Checked</span>
<strong id="healthChecked">—</strong>
</div>
<div>
<span>OK</span>
<strong id="healthOk">—</strong>
</div>
<div>
<span>Broken</span>
<strong id="healthBroken">—</strong>
</div>
<div>
<span>External</span>
<strong id="healthExternal">—</strong>
</div>
<div>
<span>Skipped</span>
<strong id="healthSkipped">—</strong>
</div>
</section>

<section class="health-panel">
<div class="health-panel-header">
<h2>Broken Links</h2>
<span id="healthStatus">Scanning...</span>
</div>
<div id="brokenLinksList" class="health-list">
<p class="health-empty">Scanning local markdown links...</p>
</div>
</section>
</main>

<script src="js/theme.js"></script>
<script type="module" src="js/health.js"></script>
</body>
</html>
