<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock-OS Pirating Dashboard</title>
<link rel="icon" href="/assets/favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="/assets/favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="/assets/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#4f6475">
<script src="/js/theme-init.js"></script>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="grid-overlay"></div>

<nav class="navbar">

<div class="logo-group">
<img src="/assets/Rock-OS-Hero-Steel.png" class="logo theme-logo">
<div class="brand">Rock-OS</div>
</div>

<div class="nav-links">
<a href="/index.html">HOME</a>
<a href="/profiles.html">PROFILES</a>
<a href="/dashboards.html">DASHBOARDS</a>
<div class="nav-menu">
<button class="nav-menu-trigger" type="button" aria-haspopup="true" aria-expanded="false">MENU</button>
<div class="nav-menu-list" role="menu">
<a href="/bookmarks.html" role="menuitem">Bookmarks</a>
<a href="/cheatsheets.html" role="menuitem">Cheatsheets</a>
<a href="/dotfiles.html" role="menuitem">Dotfiles</a>
<a href="/guides.html" role="menuitem">Guides</a>
<a href="/scripts.html" role="menuitem">Scripts</a>
<a href="/wiki.html" role="menuitem">Wiki</a>
</div>
</div>
<select id="themeSelect" class="theme-select" aria-label="Theme">
<option value="steel">Steel</option>
<option value="rugged">Rugged</option>
<option value="cyberpunk">Cyberpunk</option>
<option value="blue-grass">Blue-Grass</option>
</select>
</div>

</nav>

<div class="layout">

<div class="sidebar" id="sidebar">
	<div class="sidebar-header">
		<h3>Pirating</h3>
		<div class="sidebar-actions">
			<button id="refreshProfilesBtn" class="icon-sidebar-btn" aria-label="Refresh Pirating Dashboard" title="Refresh dashboard">&#x21BB;</button>
			<button id="toggleAllFoldersBtn" class="icon-sidebar-btn" aria-label="Expand all folders" title="Expand all folders">&#x229E;</button>
			<button id="collapseSidebarBtn" class="icon-sidebar-btn" aria-label="Collapse Sidebar" title="Collapse sidebar">&#x2630;</button>
		</div>
	</div>
	<div class="wiki-search">
		<input id="profilesSearchInput" type="search" placeholder="Search Pirating" autocomplete="off" aria-label="Search Pirating">
		<div id="profilesSearchStatus" class="wiki-search-status"></div>
	</div>
	<div id="sidebarListContainer"></div>
</div>
<div class="sidebar-resizer" id="sidebarResizer"></div>
<button id="expandSidebarBtn" class="expand-sidebar-btn" aria-label="Expand Sidebar" title="Open sidebar" style="display:none;">&#x2630;</button>

<div class="content" id="content">

<h1>Pirating</h1>

<p>Select a dashboard document.</p>

</div>

<aside class="wiki-toc" id="wikiToc" aria-label="Table of contents"></aside>

</div>

<script src="/js/vendor/highlight.min.js"></script>
<script src="/js/vendor/languages/bash.min.js"></script>
<script src="/js/vendor/languages/powershell.min.js"></script>
<script src="/js/theme.js"></script>
<script type="module" src="/js/profiles.js"></script>
<script src="/js/sidebar-resizer.js"></script>
<script>
const sidebar = document.getElementById('sidebar');
const collapseSidebarBtn = document.getElementById('collapseSidebarBtn');
const expandSidebarBtn = document.getElementById('expandSidebarBtn');
const content = document.getElementById('content');
const resizer = document.getElementById('sidebarResizer');

collapseSidebarBtn.addEventListener('click', function() {
	sidebar.classList.add('collapsed');
	expandSidebarBtn.style.display = 'block';
	sidebar.style.display = 'none';
	if (resizer) resizer.style.display = 'none';
	content.classList.add('fullwidth');
});

expandSidebarBtn.addEventListener('click', function() {
	sidebar.classList.remove('collapsed');
	expandSidebarBtn.style.display = 'none';
	sidebar.style.display = '';
	if (resizer) resizer.style.display = '';
	content.classList.remove('fullwidth');
});
</script>
</body>
</html>
