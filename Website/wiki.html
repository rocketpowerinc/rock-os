<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock-OS Wiki</title>
<link rel="icon" href="assets/favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="assets/favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">
<meta name="theme-color" content="#4f6475">
<script src="js/theme-init.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="grid-overlay"></div>

<nav class="navbar">

<div class="logo-group">
<img src="assets/Rock-OS-Hero-Steel.png" class="logo theme-logo">
<div class="brand">Rock-OS</div>
</div>

<div class="nav-links">
<a href="index.html">HOME</a>
<a href="wiki.html">WIKI</a>
<select id="themeSelect" class="theme-select" aria-label="Theme">
<option value="steel">Steel</option>
<option value="papers">Rugged</option>
<option value="rock">Cyberpunk</option>
<option value="scissors">Blue-Grass</option>
</select>
</div>

</nav>

<div class="layout">


<div class="sidebar" id="sidebar">
	<div class="sidebar-header">
		<h3>Wiki</h3>
		<div class="sidebar-actions">
			<button id="refreshWikiBtn" class="icon-sidebar-btn" aria-label="Refresh Wiki" title="Refresh wiki">&#x21BB;</button>
			<button id="collapseSidebarBtn" class="icon-sidebar-btn" aria-label="Collapse Sidebar" title="Collapse sidebar">&#x25C0;</button>
		</div>
	</div>
	<div class="wiki-search">
		<input id="wikiSearchInput" type="search" placeholder="Search wiki" autocomplete="off" aria-label="Search wiki">
		<div id="wikiSearchStatus" class="wiki-search-status"></div>
	</div>
	<div id="sidebarListContainer"></div>
</div>
<button id="expandSidebarBtn" class="expand-sidebar-btn" aria-label="Expand Sidebar" style="display:none;">&#x25B6;</button>

<div class="content" id="content">

<h1>Rock-OS Wiki</h1>

<p>Select a markdown document.</p>

</div>

</div>


<script src="https://cdn.jsdelivr.net/npm/markdown-it/dist/markdown-it.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/bash.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/languages/powershell.min.js"></script>
<script src="js/theme.js"></script>
<script src="js/wiki.js"></script>
<script>
// Sidebar collapse/expand logic
const sidebar = document.getElementById('sidebar');
const collapseSidebarBtn = document.getElementById('collapseSidebarBtn');
const expandSidebarBtn = document.getElementById('expandSidebarBtn');
const content = document.getElementById('content');

collapseSidebarBtn.addEventListener('click', function() {
	sidebar.classList.add('collapsed');
	expandSidebarBtn.style.display = 'block';
	sidebar.style.display = 'none';
	content.classList.add('fullwidth');
});

expandSidebarBtn.addEventListener('click', function() {
	sidebar.classList.remove('collapsed');
	expandSidebarBtn.style.display = 'none';
	sidebar.style.display = '';
	content.classList.remove('fullwidth');
});
</script>

</body>
</html>
