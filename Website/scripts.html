<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rock-OS Scripts</title>
<link rel="icon" href="assets/favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="assets/favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="manifest" href="site.webmanifest">
<meta name="theme-color" content="#4f6475">
<script src="js/theme-init.js"></script>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="grid-overlay"></div>

<nav class="navbar">

<div class="logo-group">
<img src="assets/Rock-OS-Hero-Steel.png" class="logo theme-logo" alt="Rock-OS">
<div class="brand">Rock-OS</div>
</div>

<div class="nav-links">
<a href="index.html">HOME</a>
<a href="dashboards.html">DASHBOARDS</a>
<div class="nav-menu">
<button class="nav-menu-trigger" type="button" aria-haspopup="true" aria-expanded="false">MENU</button>
<div class="nav-menu-list" role="menu">
<a href="bookmarks.html" role="menuitem">Bookmarks</a>
<a href="cheatsheets.html" role="menuitem">Cheatsheets</a>
<a href="dotfiles.html" role="menuitem">Dotfiles</a>
<a href="guides.html" role="menuitem">Guides</a>
<a href="scripts.html" role="menuitem">Scripts</a>
<a href="wiki.html" role="menuitem">Wiki</a>
</div>
</div>
<select id="themeSelect" class="theme-select" aria-label="Theme">
<option value="steel">Steel</option>
<option value="rugged">Rugged</option>
<option value="cyberpunk">Cyberpunk</option>
<option value="blue-grass">Blue-Grass</option>
</select>
</div>

</nav>

<main class="scripts-layout">

<aside class="sidebar" id="sidebar" aria-label="Available scripts">
<div class="sidebar-header">
<h3>Scripts</h3>
<div class="sidebar-actions">
<button id="refreshScriptsBtn" class="icon-sidebar-btn" aria-label="Refresh Scripts" title="Refresh scripts">&#x21BB;</button>
<button id="toggleAllScriptsBtn" class="icon-sidebar-btn" aria-label="Expand all script folders" title="Expand all script folders">&#x229E;</button>
<button id="collapseSidebarBtn" class="icon-sidebar-btn" aria-label="Collapse Sidebar" title="Collapse sidebar">&#x2630;</button>
</div>
</div>
<div class="wiki-search">
<input id="scriptSearchInput" type="search" placeholder="Search scripts" autocomplete="off" aria-label="Search scripts">
<div id="scriptSearchStatus" class="wiki-search-status"></div>
</div>
<div id="scriptList" class="script-list"></div>
</aside>
<div class="sidebar-resizer" id="sidebarResizer"></div>
<button id="expandSidebarBtn" class="expand-sidebar-btn" aria-label="Expand Sidebar" title="Open sidebar" style="display:none;">&#x2630;</button>

<section class="script-workbench">
<div class="script-workbench-header">
<div>
<h1>Scripts</h1>
</div>
<button id="runScriptBtn" class="command-button primary" type="button" disabled>Run</button>
</div>

<div id="scriptStatus" class="script-status">
Select a script to preview it before running.
</div>

<div class="script-stage">
<section class="script-panel" id="previewPanel">
<div class="script-panel-header">
<span>Preview</span>
<small id="scriptMeta">No script selected</small>
</div>
<pre class="script-preview"><code id="scriptPreview">Select a script from the sidebar.</code></pre>
</section>
</div>
</section>

</main>

<script src="js/theme.js"></script>
<script type="module" src="js/scripts.js"></script>
<script src="js/sidebar-resizer.js"></script>
<script>
// Sidebar collapse/expand logic
const sidebar = document.getElementById('sidebar');
const collapseSidebarBtn = document.getElementById('collapseSidebarBtn');
const expandSidebarBtn = document.getElementById('expandSidebarBtn');
const resizer = document.getElementById('sidebarResizer');

if (collapseSidebarBtn && expandSidebarBtn && sidebar) {
	collapseSidebarBtn.addEventListener('click', function() {
		sidebar.classList.add('collapsed');
		expandSidebarBtn.style.display = 'block';
		sidebar.style.display = 'none';
		if (resizer) resizer.style.display = 'none';
	});

	expandSidebarBtn.addEventListener('click', function() {
		sidebar.classList.remove('collapsed');
		expandSidebarBtn.style.display = 'none';
		sidebar.style.display = '';
		if (resizer) resizer.style.display = '';
	});
}
</script>
</body>
</html>
