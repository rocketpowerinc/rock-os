<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <g id="rocket-lowpoly" transform="translate(0, 1) rotate(45, 50, 50)">
    <!-- LEFT WING W/ SHADED FACETS -->
    <polygon points="37,48 18,70 30,60" fill="#15031b" />
    <polygon points="18,70 14,76 28,74" fill="#200429" />
    <polygon points="14,76 25,78 28,74" fill="#2d0a42" />
    <polygon points="28,74 25,78 38,72" fill="#3c0a52" />
    <polygon points="30,60 18,70 28,74" fill="#1d0426" />
    <polygon points="37,48 30,60 38,72" fill="#260533" />

    <!-- RIGHT WING W/ SHADED FACETS -->
    <polygon points="63,48 82,70 70,60" fill="#22042b" />
    <polygon points="82,70 86,76 72,74" fill="#2d063b" />
    <polygon points="86,76 75,78 72,74" fill="#3c0b4f" />
    <polygon points="72,74 75,78 62,72" fill="#4d0e66" />
    <polygon points="70,60 82,70 72,74" fill="#2a0536" />
    <polygon points="63,48 70,60 62,72" fill="#350645" />

    <!-- NOSE CONE (Shaded Faceted Cone) -->
    <polygon points="50,8 45,20 50,22" fill="#474c66" />
    <polygon points="50,8 50,22 55,20" fill="#6b7299" />
    <polygon points="45,20 41,30 50,32" fill="#383c52" />
    <polygon points="55,20 50,22 50,32" fill="#575d7d" />
    <polygon points="55,20 50,32 59,30" fill="#7a82ab" />
    <polygon points="41,30 37,40 46,42" fill="#2c2f40" />
    <polygon points="41,30 46,42 50,32" fill="#3a3d52" />
    <polygon points="59,30 50,32 54,42" fill="#5c638a" />
    <polygon points="59,30 54,42 63,40" fill="#8d95c4" />

    <!-- NOSE CONE GLOW ACCENTS -->
    <polygon points="50,32 46,42 50,44" fill="#ff00cc" />
    <polygon points="50,32 50,44 54,42" fill="#d0ff00" />

    <!-- FUSELAGE / BODY SECTIONS -->
    <!-- Row 1 (Y: 40 to 52) -->
    <polygon points="37,40 36,52 43,53" fill="#222430" />
    <polygon points="37,40 43,53 46,42" fill="#2d2f40" />
    <polygon points="46,42 43,53 50,54" fill="#ff00cc" />
    <polygon points="46,42 50,54 50,44" fill="#ff4dd2" />
    <polygon points="54,42 50,44 50,54" fill="#e2ff4d" />
    <polygon points="54,42 50,54 57,53" fill="#d0ff00" />
    <polygon points="54,42 57,53 63,40" fill="#575d7d" />
    <polygon points="63,40 57,53 64,52" fill="#6c7293" />

    <!-- Row 2 (Y: 52 to 62) -->
    <polygon points="36,52 37,62 44,63" fill="#2a2d3d" />
    <polygon points="36,52 44,63 43,53" fill="#34384c" />
    <polygon points="43,53 44,63 50,64" fill="#b50091" />
    <polygon points="43,53 50,64 50,54" fill="#ff00cc" />
    <polygon points="57,53 50,54 50,64" fill="#d0ff00" />
    <polygon points="57,53 50,64 56,63" fill="#9fb300" />
    <polygon points="57,53 56,63 64,52" fill="#5c638a" />
    <polygon points="64,52 56,63 63,62" fill="#7a82ab" />

    <!-- Row 3 (Y: 62 to 72) -->
    <polygon points="37,62 38,72 44,73" fill="#1b1c26" />
    <polygon points="37,62 44,73 44,63" fill="#252733" />
    <polygon points="44,63 44,73 50,74" fill="#ff00cc" />
    <polygon points="44,63 50,74 50,64" fill="#ff66df" />
    <polygon points="56,63 50,64 50,74" fill="#e8ff66" />
    <polygon points="56,63 50,74 56,73" fill="#d0ff00" />
    <polygon points="56,63 56,73 63,62" fill="#4d5373" />
    <polygon points="63,62 56,73 62,72" fill="#626a94" />

    <!-- PORT WINDOW (Double ring faceted circle overlay) -->
    <!-- Window Frame -->
    <polygon points="46,47 50,44 54,47 54,53 50,56 46,53" fill="#181920" stroke="#ff00cc" stroke-width="0.75" />
    <!-- Window Glass -->
    <polygon points="48,48 50,46 52,48 52,52 50,54 48,52" fill="#00ffcc" />
    <!-- Reflection -->
    <polygon points="48,48 50,46 51,49 49,51" fill="#ffffff" opacity="0.6" />

    <!-- ENGINE BELLS -->
    <polygon points="38,72 35,80 41,81" fill="#15161c" />
    <polygon points="38,72 41,81 44,73" fill="#22242e" />
    
    <polygon points="44,73 43,81 50,82" fill="#252733" />
    <polygon points="44,73 50,82 50,74" fill="#323545" />
    <polygon points="56,73 50,74 50,82" fill="#3e4257" />
    <polygon points="56,73 50,82 57,81" fill="#2e3140" />

    <polygon points="56,73 59,81 62,72" fill="#323545" />
    <polygon points="62,72 59,81 65,80" fill="#42475c" />

    <!-- DETAILED THRUSTER FLAMES -->
    <polygon points="35,80 26,94 41,87" fill="#ff00cc" opacity="0.75" />
    <polygon points="65,80 59,87 74,94" fill="#d0ff00" opacity="0.75" />
    <polygon points="41,81 37,97 46,90" fill="#ff33aa" />
    <polygon points="46,90 50,98 54,90" fill="#ffffff" />
    <polygon points="59,81 54,90 63,97" fill="#e2ff33" />
    <polygon points="43,81 46,90 50,82" fill="#ff99e6" />
    <polygon points="57,81 50,82 54,90" fill="#f3ff99" />
  </g>
</svg>
