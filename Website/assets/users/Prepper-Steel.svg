<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Background circle matching Steel theme -->
  <circle cx="50" cy="50" r="48" fill="#172029" stroke="#4f6475" stroke-width="2" />
  
  <g id="campfire" transform="translate(0, -2)">
    <!-- STONES (Steel Metallic Slate) -->
    <!-- Left Rock -->
    <polygon points="18,80 32,70 28,84" fill="#506070" stroke="#7c8d9c" stroke-width="0.5" />
    <polygon points="32,70 42,80 28,84" fill="#687888" stroke="#7c8d9c" stroke-width="0.5" />
    <polygon points="18,80 28,84 22,88" fill="#384552" stroke="#7c8d9c" stroke-width="0.5" />
    <polygon points="28,84 42,80 38,88 22,88" fill="#7c8d9c" stroke="#7c8d9c" stroke-width="0.5" />
    
    <!-- Right Rock -->
    <polygon points="82,80 68,70 72,84" fill="#506070" stroke="#92bad2" stroke-width="0.5" />
    <polygon points="68,70 58,80 72,84" fill="#687888" stroke="#92bad2" stroke-width="0.5" />
    <polygon points="82,80 72,84 78,88" fill="#384552" stroke="#92bad2" stroke-width="0.5" />
    <polygon points="72,84 58,80 62,88 78,88" fill="#92bad2" stroke="#92bad2" stroke-width="0.5" />
    
    <!-- Front Rock -->
    <polygon points="38,82 50,73 50,86" fill="#687888" stroke="#7c8d9c" stroke-width="0.5" />
    <polygon points="50,73 62,82 50,86" fill="#7c8d9c" stroke="#92bad2" stroke-width="0.5" />
    <polygon points="38,82 50,86 46,90" fill="#506070" stroke="#7c8d9c" stroke-width="0.5" />
    <polygon points="62,82 50,86 54,90" fill="#586878" stroke="#92bad2" stroke-width="0.5" />
    <polygon points="50,86 46,90 54,90" fill="#3d4a57" stroke="#7c8d9c" stroke-width="0.5" />

    <!-- LOGS (Dark Steel Chrome Logs) -->
    <!-- Log 1 (Left to Right) -->
    <polygon points="25,73 70,53 74,58 29,78" fill="#2d3842" />
    <polygon points="29,78 74,58 76,63 31,83" fill="#3d4c5a" />
    <polygon points="25,73 29,78 31,83 27,78" fill="#506475" />
    
    <!-- Log 2 (Right to Left) -->
    <polygon points="75,73 30,53 26,58 71,78" fill="#252e37" />
    <polygon points="71,78 26,58 24,63 69,83" fill="#35424f" />
    <polygon points="75,73 71,78 69,83 73,78" fill="#465768" />

    <!-- FLAMES (Cold Steel Blue & Cyan Facets) -->
    <!-- Outer Flame -->
    <polygon points="50,20 35,65 50,75" fill="#4f6475" opacity="0.85" />
    <polygon points="50,20 50,75 65,65" fill="#92bad2" opacity="0.85" />
    
    <!-- Middle Flame -->
    <polygon points="50,35 42,65 50,72" fill="#6a8296" />
    <polygon points="50,35 50,72 58,65" fill="#a8ccdf" />
    
    <!-- Core Flame -->
    <polygon points="50,48 45,65 50,70" fill="#d9e8f0" />
    <polygon points="50,48 50,70 55,65" fill="#ffffff" />
  </g>
</svg>
