<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <g id="campfire" transform="translate(0, -1)">
    <!-- BACK ROCK RING (Dark background stones) -->
    <polygon points="36,70 50,65 42,72" fill="#0c0c12" stroke="#ff00cc" stroke-width="0.3" />
    <polygon points="50,65 64,70 58,72" fill="#0d0d14" stroke="#d0ff00" stroke-width="0.3" />
    <polygon points="42,72 50,65 58,72" fill="#12121a" stroke="#ff00cc" stroke-width="0.3" />

    <!-- LOG 1 (Left to Right Diagonal) -->
    <polygon points="22,76 68,52 74,56 28,80" fill="#15021c" />
    <polygon points="28,80 74,56 76,62 30,86" fill="#250630" />
    <!-- End Cap Left -->
    <polygon points="18,74 22,76 28,80 24,78" fill="#ff00cc" opacity="0.8" />
    <polygon points="18,74 24,78 20,82 16,78" fill="#350c45" />

    <!-- LOG 2 (Right to Left Diagonal) -->
    <polygon points="78,76 32,52 26,56 72,80" fill="#1a0424" />
    <polygon points="72,80 26,56 24,62 70,86" fill="#2b093b" />
    <!-- End Cap Right -->
    <polygon points="82,74 78,76 72,80 76,78" fill="#d0ff00" opacity="0.8" />
    <polygon points="82,74 76,78 80,82 84,78" fill="#3f1254" />

    <!-- LOG 3 (Center vertical/leaning log) -->
    <polygon points="46,80 44,60 50,58 52,80" fill="#110117" />
    <polygon points="52,80 50,58 56,60 54,80" fill="#20042b" />
    <!-- End cap front -->
    <polygon points="44,80 52,80 50,86 42,86" fill="#2d0a3d" />
    <polygon points="52,80 54,80 56,86 50,86" fill="#ff00cc" opacity="0.6" />

    <!-- BASE STONES (Faceted Rock Ring in Foreground) -->
    <!-- Far Left Stone -->
    <polygon points="15,80 26,72 23,83" fill="#0f0f15" stroke="#ff00cc" stroke-width="0.4" />
    <polygon points="26,72 32,80 23,83" fill="#181822" stroke="#ff00cc" stroke-width="0.4" />
    <polygon points="15,80 23,83 18,87" fill="#08080c" stroke="#ff00cc" stroke-width="0.4" />
    <polygon points="23,83 32,80 28,87 18,87" fill="#242433" stroke="#ff00cc" stroke-width="0.4" />

    <!-- Mid Left Stone -->
    <polygon points="30,82 40,75 36,86" fill="#181822" stroke="#d0ff00" stroke-width="0.4" />
    <polygon points="40,75 46,82 36,86" fill="#242433" stroke="#d0ff00" stroke-width="0.4" />
    <polygon points="30,82 36,86 33,89" fill="#0f0f15" stroke="#d0ff00" stroke-width="0.4" />
    <polygon points="36,86 46,82 42,89 33,89" fill="#12121a" stroke="#d0ff00" stroke-width="0.4" />

    <!-- Front Center Stone -->
    <polygon points="43,84 50,77 50,87" fill="#242433" stroke="#ff00cc" stroke-width="0.4" />
    <polygon points="50,77 57,84 50,87" fill="#2c2c3d" stroke="#d0ff00" stroke-width="0.4" />
    <polygon points="43,84 50,87 47,91" fill="#12121a" stroke="#ff00cc" stroke-width="0.4" />
    <polygon points="57,84 50,87 53,91" fill="#181822" stroke="#d0ff00" stroke-width="0.4" />
    <polygon points="50,87 47,91 53,91" fill="#0a0a0f" stroke="#ff00cc" stroke-width="0.4" />

    <!-- Mid Right Stone -->
    <polygon points="54,82 60,75 64,86" fill="#181822" stroke="#ff00cc" stroke-width="0.4" />
    <polygon points="60,75 70,82 64,86" fill="#242433" stroke="#ff00cc" stroke-width="0.4" />
    <polygon points="54,82 64,86 58,89" fill="#0f0f15" stroke="#ff00cc" stroke-width="0.4" />
    <polygon points="64,86 70,82 67,89 58,89" fill="#12121a" stroke="#ff00cc" stroke-width="0.4" />

    <!-- Far Right Stone -->
    <polygon points="68,80 74,72 77,83" fill="#0f0f15" stroke="#d0ff00" stroke-width="0.4" />
    <polygon points="74,72 85,80 77,83" fill="#181822" stroke="#d0ff00" stroke-width="0.4" />
    <polygon points="85,80 77,83 82,87" fill="#08080c" stroke="#d0ff00" stroke-width="0.4" />
    <polygon points="77,83 85,80 82,87 79,87" fill="#242433" stroke="#d0ff00" stroke-width="0.4" />

    <!-- DETAILED layered FLAMES -->
    <!-- Outer Flame Layer -->
    <polygon points="50,10 32,64 50,75" fill="#ff00cc" opacity="0.75" />
    <polygon points="50,10 50,75 68,64" fill="#d0ff00" opacity="0.75" />
    <polygon points="32,64 22,50 36,54" fill="#ff33aa" opacity="0.7" />
    <polygon points="68,64 78,50 64,54" fill="#e2ff33" opacity="0.7" />
    <polygon points="22,50 18,62 32,64" fill="#ff00cc" opacity="0.6" />
    <polygon points="78,50 82,62 68,64" fill="#d0ff00" opacity="0.6" />
    <polygon points="32,64 38,72 50,75" fill="#b50091" />
    <polygon points="68,64 62,72 50,75" fill="#9fb300" />

    <!-- Middle Flame Layer -->
    <polygon points="50,22 36,58 50,70" fill="#ff00cc" />
    <polygon points="50,22 50,70 64,58" fill="#d0ff00" />
    <polygon points="36,58 28,48 40,50" fill="#ff5cc4" />
    <polygon points="64,58 72,48 60,50" fill="#e8ff5c" />
    <polygon points="36,58 42,66 50,70" fill="#ff00a2" />
    <polygon points="64,58 58,66 50,70" fill="#b8e000" />

    <!-- Inner Core Flame Layer -->
    <polygon points="50,36 42,56 50,66" fill="#ff99e6" />
    <polygon points="50,36 50,66 58,56" fill="#f3ff99" />
    <polygon points="42,56 46,63 50,66" fill="#ffffff" />
    <polygon points="58,56 54,63 50,66" fill="#ffffff" />
  </g>
</svg>
